<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제안서 MD 변환</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="toolbar">
      <div>
        <h1>제안서 MD 변환</h1>
        <p>웹판은 PDF·이미지 중심, 풀버전은 HWPX·HWP·PDF·PPTX 변환</p>
      </div>
      <div class="toggles">
        <a class="download-link" href="https://github.com/Lex6won/proposal-md-converter/releases/latest">풀버전 다운로드</a>
        <label><input id="ocrToggle" type="checkbox" checked> OCR</label>
        <label><input id="maskToggle" type="checkbox" checked> 개인정보 마스킹</label>
      </div>
    </section>

    <section class="mode-grid">
      <div class="mode mode-primary">
        <strong>웹판</strong>
        <span>PDF, 스캔 PDF, 이미지, TXT/MD</span>
      </div>
      <a class="mode mode-download" href="https://github.com/Lex6won/proposal-md-converter/releases/latest">
        <strong>풀버전</strong>
        <span>HWPX, HWP, PDF, PPTX 변환은 다운로드 실행 권장</span>
      </a>
    </section>

    <section id="dropzone" class="dropzone" tabindex="0">
      <input id="fileInput" type="file" accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.webp,.ppt,.pptx,.hwp,.hwpx" hidden>
      <div class="drop-title">파일 선택</div>
      <div class="drop-meta">웹판: PDF, PNG, JPG, WEBP, TXT, MD · PPTX/HWP는 풀버전</div>
    </section>

    <section class="workbench">
      <div class="panel">
        <div class="panel-head">
          <strong id="fileName">대기 중</strong>
          <span id="status">파일을 선택하세요</span>
        </div>
        <textarea id="output" spellcheck="false" placeholder="변환 결과가 여기에 표시됩니다."></textarea>
      </div>
      <aside class="actions">
        <button id="convertBtn" type="button" disabled>변환</button>
        <button id="copyBtn" type="button" disabled>복사</button>
        <button id="downloadBtn" type="button" disabled>다운로드</button>
        <div id="progress" class="progress"></div>
      </aside>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
